<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>GPS Tracker v1.2.1</title>
    <meta name="app-version" content="1.2.1" />
    <style>
      /* Safe area insets for notch / Dynamic Island / home indicator */
      html { padding: 0; }
      body {
        padding-top: env(safe-area-inset-top);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
      }
      /* Bottom navigation container */
      .bottom-nav-wrap {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        z-index: 9999;
        padding: 0.5rem 1.25rem;
        padding-bottom: calc(0.75rem + env(safe-area-inset-bottom));
        background: rgba(15, 23, 42, 0.92);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-top: 1px solid rgba(255,255,255,0.08);
      }
      .bottom-nav-readme {
        max-width: 400px;
        margin: 0 auto 0.5rem auto;
        text-align: center;
        color: #94a3b8;
        font-size: 0.7rem;
        font-weight: 700;
        letter-spacing: 0.01em;
        line-height: 1.3;
      }
      .bottom-nav {
        display: flex;
        justify-content: center;
        gap: 0.5rem;
        max-width: 420px;
        margin: 0 auto;
      }
      .bottom-nav button {
        flex: 1;
        max-width: 180px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        padding: 0.75rem 1rem;
        border-radius: 0.875rem;
        font-size: 0.75rem;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        transition: all 0.2s ease;
        border: none;
        cursor: pointer;
        min-height: 48px;
      }
      .bottom-nav button.active {
        background: #6366f1;
        color: #fff;
        box-shadow: 0 4px 14px rgba(99, 102, 241, 0.3);
      }
      .bottom-nav button.inactive {
        background: #1e293b;
        color: #94a3b8;
      }
      .bottom-nav button.inactive:hover {
        background: #334155;
        color: #fff;
      }
      /* Version badge - sits above bottom nav */
      #app-version {
        position: fixed;
        right: 12px;
        bottom: calc(108px + env(safe-area-inset-bottom));
        z-index: 10000;
        padding: 3px 8px;
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.65);
        border: 1px solid rgba(148, 163, 184, 0.25);
        color: #64748b;
        font: 700 10px/1.2 ui-monospace, SFMono-Regular, Menlo, monospace;
        letter-spacing: 0.02em;
        pointer-events: none;
        opacity: 0.7;
      }
    </style>
    <script type="module" crossorigin src="/Location-Tracker/assets/index-C0DZriCl.js"></script>
    <link rel="stylesheet" crossorigin href="/Location-Tracker/assets/index-AyYkF3FZ.css">
  <link rel="manifest" href="/Location-Tracker/manifest.webmanifest"><script id="vite-plugin-pwa:register-sw" src="/Location-Tracker/registerSW.js"></script></head>
  <body>
    <div id="root"></div>
    <div id="app-version">v1.2.1</div>
  </body>
</html>
